<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>双人约定打卡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f8f9fa;font-family:"Microsoft Yahei",sans-serif;padding:40px 20px;}
.box{max-width:420px;margin:0 auto;background:#fff;border-radius:24px;padding:35px 25px;box-shadow:0 8px 30px rgba(0,0,0,0.08);text-align:center;}
h2{color:#333;margin-bottom:20px;}
.tip{color:#666;font-size:15px;margin:10px 0;}
.count{font-size:18px;color:#222;margin:25px 0;}
.btn-wrap{margin-top:30px;}
.btn{padding:13px 28px;border-radius:50px;border:none;font-size:16px;margin:0 8px;cursor:pointer;transition:.2s;}
.btn-ok{background:#409eff;color:#fff;}
.btn-no{background:#eee;color:#666;}
.btn:disabled{opacity:0.45;cursor:not-allowed;}
</style>
</head>
<body>
<div class="box">
  <h2>💘 双人约定打卡</h2>
  <div class="tip" id="dateTip"></div>
  <div class="tip" id="statusTip">等待打卡</div>
  <div class="count">已打卡：<span id="cnt">0</span>/2</div>
  <div class="btn-wrap">
    <button class="btn btn-ok" id="btn1" onclick="checkIn(1)">✅ 完成打卡</button>
    <button class="btn btn-no" id="btn2" onclick="checkIn(0)">❌ 今日缺席</button>
  </div>
</div>

<script>
const API = "https://love-api-temp.vercel.app/api/data";

let devId = localStorage.getItem("devId");
if(!devId){
  devId = "dev_" + Date.now() + "_" + Math.floor(Math.random()*10000);
  localStorage.setItem("devId", devId);
}

const now = new Date();
const y = now.getFullYear();
const m = now.getMonth() + 1;
const d = now.getDate();
const dayKey = `${y}-${m}-${d}`;
const canCheck = m >= 5 && (d === 1 || d === 15);

async function getDB() {
  try {
    let res = await fetch(API + "?t=" + Date.now());
    return await res.json();
  } catch (e) {
    return {};
  }
}

async function setDB(data) {
  await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
}

async function render() {
  let db = await getDB();
  if (!db[dayKey]) db[dayKey] = { list: [], status: {} };
  let dayData = db[dayKey];

  document.getElementById("dateTip").innerText = `${y}年${m}月${d}号 ${canCheck ? "✅ 今日可打卡" : "❌ 非打卡日"}`;
  document.getElementById("cnt").innerText = dayData.list.length > 2 ? 2 : dayData.list.length;

  let hasDone = dayData.list.includes(devId);
  document.getElementById("btn1").disabled = !canCheck || hasDone;
  document.getElementById("btn2").disabled = !canCheck || hasDone;

  let statusDom = document.getElementById("statusTip");
  if (dayData.list.length === 0) {
    statusDom.innerText = "等待两人打卡";
  } else if (dayData.list.length === 1) {
    statusDom.innerText = "已有一人打卡，等待对方";
  } else {
    let allOk = Object.values(dayData.status).every(v=>v===1);
    statusDom.innerText = allOk ? "双方都完成打卡 ✨" : "有一方缺席 💔";
  }
}

async function checkIn(flag) {
  if (!canCheck) {
    alert("今天不是规定打卡日期");
    return;
  }
  let db = await getDB();
  if (!db[dayKey]) db[dayKey] = { list: [], status: {} };
  let dayData = db[dayKey];

  if (dayData.list.includes(devId)) {
    alert("你今天已经打过卡了");
    return;
  }
  if (dayData.list.length >= 2) {
    alert("今日双人打卡已满");
    return;
  }

  dayData.list.push(devId);
  dayData.status[devId] = flag;
  await setDB(db);
  render();
}

render();
setInterval(render, 2500);
</script>
</body>
</html>
