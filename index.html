<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人爱心打卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes beat {
            0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); }
        }
        .heart-animate { animation: beat 1.2s infinite; }
    </style>
</head>

<body class="bg-gradient-to-br from-pink-100 to-pink-100 min-h-screen flex justify-center p-4">

<!-- 登录 -->
<div id="login" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl p-6 w-full max-w-sm">
        <h2 class="text-lg font-bold text-pink-500 text-center mb-3">🔒 输入密码</h2>
        <input id="pwd" type="password" class="border w-full p-2 rounded mb-3">
        <button onclick="login()" class="bg-pink-500 text-white p-2 rounded w-full">进入</button>
    </div>
</div>

<!-- 主界面 -->
<div id="app" class="hidden w-full max-w-sm bg-white/90 rounded-xl p-5 shadow text-center">
    <h1 class="text-xl font-bold text-pink-500">💘 双人爱心打卡</h1>
    <p id="date" class="my-1"></p>
    <p id="tip" class="font-bold my-1"></p>

    <div id="loading" class="py-10 text-gray-500">正在读取打卡数据...</div>

    <div id="content" class="hidden">
        <div id="heart" class="text-6xl my-3 heart-animate">❤️</div>
        <p id="state" class="font-medium"></p>
        <p class="my-2">已打卡 <span id="count">0</span>/2</p>

        <div class="flex gap-2 justify-center mt-3">
            <button id="btn1" onclick="checkIn(true)" class="bg-green-500 text-white px-4 py-2 rounded">✅ 完成</button>
            <button id="btn2" onclick="checkIn(false)" class="bg-red-500 text-white px-4 py-2 rounded">❌ 缺席</button>
        </div>

        <div class="mt-6 border-t pt-4 text-left">
            <h3 class="font-bold mb-2 text-center">📜 打卡记录</h3>
            <div id="recordList" class="text-sm max-h-40 overflow-y-auto"></div>
        </div>
    </div>
</div>

<script>
const PASSWORD = "202635";
const BIN_ID = "69f4460d36566621a8114298";
const API_KEY = "$2a$10$TdJa3W.GmV1iDbroiQ9myOkutegIe7QvPn5uDEnhBEPS5eDCxiq5i";
const API = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

const now = new Date();
const Y = now.getFullYear();
const M = now.getMonth() + 1;
const D = now.getDate();
const TODAY = `${Y}-${M}-${D}`;
const CAN_TODAY_CHECKIN = M >= 5 && (D === 1 || D === 15);

let DEVICE_ID = localStorage.getItem("deviceId");
if (!DEVICE_ID) {
    DEVICE_ID = "d_" + Math.random().toString(36).slice(4);
    localStorage.setItem("deviceId", DEVICE_ID);
}

let globalData = null;

// 统一读取云端（真正的最新数据）
async function loadFromCloud() {
    try {
        const res = await fetch(`${API}?meta=false`, { headers: { "X-Master-Key": API_KEY } });
        const data = await res.json();
        globalData = data || { checkinData: {} };
        return globalData;
    } catch (e) {
        return globalData || { checkinData: {} };
    }
}

// 保存
async function saveToCloud(data) {
    await fetch(API, {
        method: "PUT",
        headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
        body: JSON.stringify(data)
    });
    globalData = data;
}

// 统一渲染
function renderAll() {
    document.getElementById("date").innerText = `📅 ${Y}年${M}月${D}日`;
    const tipEl = document.getElementById("tip");

    if (CAN_TODAY_CHECKIN) {
        tipEl.innerText = "✅ 今日可打卡";
        tipEl.className = "text-green-600 font-bold my-1";
    } else {
        tipEl.innerText = "❌ 今日不可打卡";
        tipEl.className = "text-red-600 font-bold my-1";
    }

    const today = globalData.checkinData?.[TODAY] ?? { list: [], status: {}, broken: false };
    const count = Math.min(today.list.length, 2);
    document.getElementById("count").innerText = count;

    const isMyDone = today.list.includes(DEVICE_ID);
    const isBroken = today.broken;
    const disabled = !CAN_TODAY_CHECKIN || isMyDone || isBroken || count >= 2;

    document.getElementById("btn1").disabled = disabled;
    document.getElementById("btn2").disabled = disabled;
    document.getElementById("btn1").style.opacity = disabled ? 0.4 : 1;
    document.getElementById("btn2").style.opacity = disabled ? 0.4 : 1;

    const heart = document.getElementById("heart");
    const state = document.getElementById("state");

    if (isBroken) {
        state.innerText = "💔 爱心永久破碎";
        heart.innerText = "💔";
        return;
    }

    if (count === 0) {
        state.innerText = "等待两人打卡";
        heart.innerText = "❤️";
    } else if (count === 1) {
        state.innerText = "已1人打卡，等待另一人";
        heart.innerText = "❤️";
    } else {
        const s1 = today.status[today.list[0]];
        const s2 = today.status[today.list[1]];
        if (s1 && s2) {
            state.innerText = "✨ 两人圆满完成";
            heart.innerText = "❤️";
        } else {
            today.broken = true;
            globalData.checkinData[TODAY] = today;
            saveToCloud(globalData);
            state.innerText = "💔 爱心破碎";
            heart.innerText = "💔";
        }
    }

    const records = globalData.checkinData || {};
    const listEl = document.getElementById("recordList");
    let html = "";
    Object.keys(records).sort().reverse().forEach(date => {
        const day = date.split("-")[2];
        if (day !== "1" && day !== "15") return;
        const item = records[date];
        const cnt = item.list?.length || 0;
        let text = item.broken ? "💔 破碎" : (cnt === 2 ? "✅ 圆满" : "⏳ 未集齐");
        html += `<div class='py-1 border-b'>${date} ${text} (${cnt}/2)</div>`;
    });
    listEl.innerHTML = html || "<div class='text-center py-2'>暂无记录</div>";
}

// ==========================
// 你要的核心逻辑在这里！
// 打卡 → 先保存 → 再强制拉云端最新数据 → 再渲染
// 完美同步！
// ==========================
async function checkIn(flag) {
    if (!CAN_TODAY_CHECKIN) return alert("今天不能打卡");
    
    // 1. 先拿最新数据
    await loadFromCloud();

    const day = globalData.checkinData[TODAY] ?? { list: [], status: {}, broken: false };
    if (day.broken) { alert("爱心已破碎"); await loadFromCloud(); renderAll(); return; }
    if (day.list.includes(DEVICE_ID)) { alert("你已打卡"); await loadFromCloud(); renderAll(); return; }
    if (day.list.length >= 2) { alert("已满2人"); await loadFromCloud(); renderAll(); return; }

    // 2. 执行打卡
    day.list.push(DEVICE_ID);
    day.status[DEVICE_ID] = flag;
    globalData.checkinData[TODAY] = day;
    await saveToCloud(globalData);

    // 3. ✅ 强制刷新云端最新数据（你要的功能）
    await loadFromCloud();
    renderAll();
}

// 登录
async function login() {
    const p = document.getElementById("pwd").value;
    if (p !== PASSWORD) return alert("密码错误");

    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    await loadFromCloud(); // 进入时拿一次

    document.getElementById("loading").classList.add("hidden");
    document.getElementById("content").classList.remove("hidden");
    renderAll();
}
</script>
</body>
</html>
