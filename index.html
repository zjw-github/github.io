<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人爱心打卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        @keyframes heartShake {
            0%,100% { transform: rotate(0); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        .heart-beat { animation: heartBeat 1.2s infinite; }
        .heart-shake { animation: heartShake 2s infinite; }
    </style>
</head>
<body class="bg-pink-50 min-h-screen flex flex-col items-center p-4">

<div id="app" class="max-w-sm w-full text-center pt-6">
    <h1 class="text-xl font-bold text-pink-500">💘 双人爱心打卡</h1>
    <p id="today" class="text-gray-500 text-sm mt-1"></p>
    <p class="mt-2 text-sm text-green-600">✅ 今日可打卡</p>

    <div id="heart" class="text-7xl my-6 heart-beat text-pink-500">❤️</div>
    <p id="status" class="text-lg">等待两人打卡</p>
    <p class="text-gray-600 mt-1">已打卡 <span id="count">0</span>/2</p>

    <div class="flex gap-4 justify-center mt-6">
        <button id="btnOk" onclick="submit(true)" class="bg-green-500 text-white px-6 py-3 rounded-full">✅ 完成</button>
        <button id="btnNo" onclick="submit(false)" class="bg-red-500 text-white px-6 py-3 rounded-full">❌ 缺席</button>
    </div>
</div>

<script>
// ===================== 自动每日重置 =====================
const now = new Date();
const TODAY = `${now.getFullYear()}${now.getMonth()+1}${now.getDate()}`;
const DEVICE_ID = localStorage.getItem("DEVICE_ID") || Math.random().toString(36);
localStorage.setItem("DEVICE_ID", DEVICE_ID);

const API = "https://api.jsonbin.io/v3/b/6608f0a3ad19ca34f8645677";
const HEADERS = { "X-Master-Key": "$2b$10$uy0A5QlS5Xat0EuH5d5sreQ0XQlLFzfqRsfGDmGdN9lwfE5U5a5Cq" };

let state = { count:0, p1:null, p2:null, devices:[] };
let mySubmitted = false;

// 初始化
loadState();
document.getElementById("today").innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;

// 读取云端状态
async function loadState() {
    let res = await fetch(API);
    let data = await res.json();
    state = data.record[TODAY] || { count:0, p1:null, p2:null, devices:[] };
    mySubmitted = state.devices.includes(DEVICE_ID);
    refreshUI();
}

// 提交打卡
async function submit(ok) {
    if (mySubmitted) { alert("你已经打过卡啦！"); return; }
    mySubmitted = true;
    state.devices.push(DEVICE_ID);
    state.count++;
    if (state.count === 1) state.p1 = ok;
    if (state.count === 2) state.p2 = ok;

    await fetch(API, {
        method: "PUT",
        headers: HEADERS,
        body: JSON.stringify({ [TODAY]: state })
    });
    refreshUI();
}

// 刷新界面
function refreshUI() {
    const countEl = document.getElementById("count");
    const statusEl = document.getElementById("status");
    const heartEl = document.getElementById("heart");
    const btnOk = document.getElementById("btnOk");
    const btnNo = document.getElementById("btnNo");

    countEl.innerText = state.count;

    if (mySubmitted) {
        btnOk.disabled = true;
        btnNo.disabled = true;
        btnOk.style.opacity = 0.5;
        btnNo.style.opacity = 0.5;
    }

    if (state.count === 0) {
        statusEl.innerText = "等待两人打卡";
    } else if (state.count === 1) {
        statusEl.innerText = "已1人打卡，等待另一人";
    } else {
        if (state.p1 && state.p2) {
            statusEl.innerText = "两人完成 ✅ 爱心圆满";
            heartEl.className = "text-7xl my-6 heart-beat text-pink-500";
            heartEl.innerText = "❤️";
        } else {
            statusEl.innerText = "爱心破碎 💔 有人缺席";
            heartEl.className = "text-7xl my-6 heart-shake text-gray-400";
            heartEl.innerText = "💔";
        }
    }
}
</script>
</body>
</html>
