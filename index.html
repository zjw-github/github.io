<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人爱心日历打卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { 
                        love: '#ff4d6d',
                        loveLight: '#ff758f',
                        loveBroken: '#6b7280'
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        @keyframes heartShake {
            0%,100% { transform: rotate(0); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        .heart-beat { animation: heartBeat 1.2s infinite; }
        .heart-shake { animation: heartShake 2s infinite; }
        .fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { 
            0%{opacity:0;transform:scale(0.8);}
            100%{opacity:1;transform:scale(1);} 
        }
        .heart-icon{text-shadow:0 0 25px #ff4d6d70;}
    </style>
</head>
<body class="bg-gradient-to-br from-pink-100 via-rose-50 to-pink-100 min-h-screen p-4 flex flex-col items-center">

<div id="login" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
        <h2 class="text-lg font-bold text-center mb-3 text-love">🔒 请输入专属密码</h2>
        <input id="pwd" type="password" placeholder="请输入密码" class="w-full border border-pink-200 rounded-lg px-3 py-2 mb-3 focus:outline-none focus:border-love">
        <button onclick="login()" class="w-full bg-love text-white py-2 rounded-lg font-bold hover:bg-loveLight transition">进入</button>
    </div>
</div>

<div id="app" class="hidden w-full max-w-sm text-center">
    <h1 class="text-2xl font-bold text-love mb-1">💘 双人爱心打卡 💘</h1>

    <p id="todayText" class="text-gray-600 font-medium text-lg mb-1"></p>
    <p id="tipText" class="text-lg font-bold px-4 py-2 rounded-xl mb-4"></p>

    <div id="heart" class="text-8xl my-6 fade-in heart-beat heart-icon text-love">❤️</div>
    <p id="stateText" class="text-lg font-medium text-gray-700">加载中...</p>
    <p class="text-gray-600 mb-4">已打卡 <span id="countText">0</span>/2</p>

    <div class="flex gap-3 justify-center mb-6">
        <button id="btnOk" onclick="doCheck(true)" class="bg-green-500 text-white px-6 py-3 rounded-full font-bold shadow-lg hover:bg-green-400 transition">✅ 完成</button>
        <button id="btnNo" onclick="doCheck(false)" class="bg-red-500 text-white px-6 py-3 rounded-full font-bold shadow-lg hover:bg-red-400 transition">❌ 缺席</button>
    </div>
</div>
