<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人爱心日历打卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { 
                        love: '#ff4d6d',
                        loveLight: '#ff758f',
                        loveBroken: '#6b7280'
                    } 
                }
            }
        }
    </script>
    <style>
        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        @keyframes heartShake {
            0%,100% { transform: rotate(0); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        .heart-beat { animation: heartBeat 1.2s infinite; }
        .heart-shake { animation: heartShake 2s infinite; }
        .fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { 0%{opacity:0;transform:scale(0.8);}100%{opacity:1;transform:scale(1);} }
        .heart-icon{text-shadow:0 0 25px #ff4d6d70;}
    </style>
</head>
<body class="bg-gradient-to-br from-pink-100 via-rose-50 to-pink-100 min-h-screen p-4 flex flex-col items-center">

<!-- 密码弹窗 -->
<div id="login" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
        <h2 class="text-lg font-bold text-center mb-3 text-love">🔒 请输入专属密码</h2>
        <input id="pwd" type="password" placeholder="请输入密码" class="w-full border border-pink-20 rounded-lg px-3 py-2 mb-3 focus:outline-none focus:border-love">
        <button onclick="login()" class="w-full bg-love text-white py-2 rounded-lg font-bold hover:bg-loveLight transition">进入</button>
    </div>
</div>

<!-- 主界面 -->
<div id="app" class="hidden w-full max-w-sm text-center">
    <h1 class="text-2xl font-bold text-love mb-1">💘 双人爱心打卡 💘</h1>
    <p id="today" class="text-gray-500 mb-2"></p>
    <p id="tip" class="inline-block px-3 py-1 rounded-full text-sm font-medium mb-4"></p>

    <div id="heart" class="text-8xl my-6 fade-in heart-beat heart-icon text-love">❤️</div>
    <p id="state" class="text-lg font-medium text-gray-700">等待两人打卡</p>
    <p class="text-gray-600 mb-4">已打卡 <span id="count">0</span>/2</p>

    <div class="flex gap-3 justify-center mb-6">
        <button id="ok" onclick="go(true)" class="bg-green-500 text-white px-6 py-3 rounded-full font-bold shadow-lg hover:bg-green-400 transition">✅ 完成</button>
        <button id="no" onclick="go(false)" class="bg-red-500 text-white px-6 py-3 rounded-full font-bold shadow-lg hover:bg-red-400 transition">❌ 缺席</button>
    </div>

    <div class="w-full bg-white/80 rounded-xl p-4 shadow-md text-left mt-2">
        <h3 class="font-bold text-love mb-3">📜 打卡记录</h3>
        <div id="recordList" class="space-y-2 text-sm text-gray-700">
            <div class="text-gray-400">暂无记录</div>
        </div>
    </div>
</div>

<script>
// ===================== 配置 =====================
const PASSWORD = "123456";
const now = new Date();
const Y = now.getFullYear(), M = now.getMonth()+1, D = now.getDate();
const TODAY = `${Y}${M}${D}`;
const DEVICE_ID = localStorage.getItem("DEVICE_ID") || Math.random().toString(36);
localStorage.setItem("DEVICE_ID", DEVICE_ID);

const API = "https://api.jsonbin.io/v3/b/6608f0a3ad19ca34f8645677";
const HEADERS = {
    "Content-Type": "application/json",
    "X-Master-Key": "$2b$10$uy0A5QlS5Xat0EuH5d5sreQ0XQlLFzfqRsfGDmGdN9lwfE5U5a5Cq"
};

let state = { count:0, p1:null, p2:null, devices:[] };
let myDone = false;
let isSubmitting = false;

// 初始化
document.getElementById("today").innerText = `${Y}年${M}月${D}日`;
loadState();
setInterval(loadState, 1500); // 自动同步

// 读取最新状态
async function loadState() {
    try {
        const res = await fetch(API);
        const data = await res.json();
        const todayData = data.record[TODAY] || { count:0, p1:null, p2:null, devices:[] };
        state = todayData;
        myDone = state.devices.includes(DEVICE_ID);
        refreshUI();
    } catch (e) {}
}

// 登录
function login() {
    if (document.getElementById("pwd").value === PASSWORD) {
        document.getElementById("login").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        refreshRecord();
    } else alert("密码错误");
}

// 打卡（终极修复版）
async function go(ok) {
    if (isSubmitting) return;
    if (myDone) { alert("你已打卡"); return; }

    isSubmitting = true;
    try {
        // 先从云端拉取最新数据（最关键修复）
        const fullRes = await fetch(API);
        const fullData = await fullRes.json();
        const latest = fullData.record[TODAY] || { count:0, p1:null, p2:null, devices:[] };

        // 基于最新状态修改
        if (latest.devices.includes(DEVICE_ID)) {
            alert("你已打卡");
            isSubmitting = false;
            return;
        }

        latest.devices.push(DEVICE_ID);
        latest.count++;
        if (latest.count === 1) latest.p1 = ok;
        if (latest.count === 2) latest.p2 = ok;

        // 提交
        fullData.record[TODAY] = latest;
        await fetch(API, { method:"PUT", headers:HEADERS, body:JSON.stringify(fullData.record) });

        // 本地更新
        state = latest;
        myDone = true;
        refreshUI();
        refreshRecord();
    } finally {
        isSubmitting = false;
    }
}

// 刷新界面
function refreshUI() {
    const countEl = document.getElementById("count");
    const stateEl = document.getElementById("state");
    const heartEl = document.getElementById("heart");
    const okBtn = document.getElementById("ok");
    const noBtn = document.getElementById("no");
    const tipEl = document.getElementById("tip");

    countEl.innerText = state.count;
    tipEl.innerText = "✅ 今日可打卡";
    tipEl.className = "bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm font-medium mb-4";

    if (myDone) {
        okBtn.disabled = true;
        noBtn.disabled = true;
        okBtn.style.opacity = "0.5";
        noBtn.style.opacity = "0.5";
    } else {
        okBtn.disabled = false;
        noBtn.disabled = false;
        okBtn.style.opacity = "1";
        noBtn.style.opacity = "1";
    }

    if (state.count === 0) {
        stateEl.innerText = "等待两人打卡";
    } else if (state.count === 1) {
        stateEl.innerText = "已1人打卡，等待另一人";
    } else {
        if (state.p1 && state.p2) {
            stateEl.innerText = "两人完成 ✨ 爱心圆满";
            heartEl.className = "text-8xl my-6 fade-in heart-beat heart-icon text-love";
            heartEl.innerText = "❤️";
        } else {
            stateEl.innerText = "爱心破碎 💔";
            heartEl.className = "text-8xl my-6 fade-in heart-shake text-loveBroken";
            heartEl.innerText = "💔";
        }
    }
}

// 打卡记录
function refreshRecord() {
    const list = document.getElementById("recordList");
    const result = (state.p1 && state.p2) ? "✅ 圆满" : "💔 破碎";
    list.innerHTML = `
        <div class="flex justify-between p-2 border-b border-pink-100">
            <span>${Y}年${M}月${D}日</span>
            <span class="font-medium">${state.count >= 2 ? result : "⌛ 未完成"}</span>
        </div>
    `;
}
</script>
</body>
</html>
