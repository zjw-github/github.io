<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人爱心日历打卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { 
                        love: '#ff4d6d',
                        loveLight: '#ff758f',
                        loveBroken: '#6b7280'
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .heart-beat { animation: heartBeat 1.2s infinite; }
        .fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { 
            0%{opacity:0;transform:scale(0.8);}
            100%{opacity:1;transform:scale(1);} 
        }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-100 via-rose-50 to-pink-100 min-h-screen p-4 flex flex-col items-center">

<div id="login" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
        <h2 class="text-lg font-bold text-center mb-3 text-love">🔒 请输入专属密码</h2>
        <input id="pwd" type="password" placeholder="请输入密码" class="w-full border border-pink-200 rounded-lg px-3 py-2 mb-3 focus:outline-none focus:border-love">
        <button onclick="login()" class="w-full bg-love text-white py-2 rounded-lg font-bold hover:bg-loveLight transition">进入</button>
    </div>
</div>

<div id="app" class="hidden w-full max-w-sm text-center">
    <h1 class="text-2xl font-bold text-love mb-1">💘 双人爱心打卡 💘</h1>

    <p id="todayText" class="text-gray-600 font-medium text-lg mb-1"></p>
    <p id="tipText" class="text-lg font-bold px-4 py-2 rounded-xl mb-4"></p>

    <div id="heart" class="text-8xl my-6 fade-in heart-beat text-love">❤️</div>
    <p id="stateText" class="text-lg font-medium text-gray-700">加载中...</p>
    <p class="text-gray-600 mb-4">已打卡 <span id="countText">0</span>/2</p>

    <div class="flex gap-3 justify-center mb-6">
        <button id="btnOk" onclick="doCheck(true)" class="bg-green-500 text-white px-6 py-3 rounded-full font-bold shadow-lg hover:bg-green-400 transition">✅ 完成</button>
        <button id="btnNo" onclick="doCheck(false)" class="bg-red-500 text-white px-6 py-3 rounded-full font-bold shadow-lg hover:bg-red-400 transition">❌ 缺席</button>
    </div>
</div>

<script>
const PASSWORD = "202635";

const BIN_ID = "69f4460d36566621a8114298";
const API_KEY = "$2a$10$TdJa3W.GmV1iDbroiQ9myOkutegIe7QvPn5uDEnhBEPS5eDCxiq5i";
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

const now = new Date();
const Y = now.getFullYear();
const M = now.getMonth() + 1;
const D = now.getDate();
const TODAY_KEY = `${Y}-${M}-${D}`;
const CAN_CHECK = M >= 5 && (D === 1 || D === 15);

let devId = localStorage.getItem("devId");
if(!devId){
    devId = "dev_" + Math.random().toString(36).slice(2);
    localStorage.setItem("devId", devId);
}

// 全局缓存，防止卡死
let cacheData = { checkinData: {} };

// 安全请求，永不卡死
async function fetchData() {
    try {
        const controller = new AbortController();
        setTimeout(() => controller.abort(), 3000);
        const res = await fetch(API_URL + "?meta=false", {
            headers: { "X-Master-Key": API_KEY },
            signal: controller.signal
        });
        const data = await res.json();
        if (data?.checkinData) cacheData = data;
        return data;
    } catch (e) {
        return cacheData;
    }
}

// 安全保存
async function updateData(data) {
    try {
        await fetch(API_URL, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "X-Master-Key": API_KEY
            },
            body: JSON.stringify(data)
        });
    } catch (e) {}
}

// 渲染界面
function renderPage(data) {
    document.getElementById("todayText").innerText = `📅 今天：${Y}年${M}月${D}日`;
    const tip = document.getElementById("tipText");
    
    if(CAN_CHECK){
        tip.innerText = "✅ 今日可以打卡";
        tip.className = "text-lg font-bold px-4 py-2 rounded-xl mb-4 bg-green-100 text-green-800";
    }else{
        tip.innerText = "❌ 今日不可打卡";
        tip.className = "text-lg font-bold px-4 py-2 rounded-xl mb-4 bg-red-100 text-red-800";
    }

    const checkinData = data.checkinData || {};
    const day = checkinData[TODAY_KEY] || { list: [], status: {}, broken: false };
    const cnt = Math.min(day.list.length, 2);
    document.getElementById("countText").innerText = cnt;

    const btnOk = document.getElementById("btnOk");
    const btnNo = document.getElementById("btnNo");
    const myDone = day.list.includes(devId);

    if (day.broken) {
        btnOk.disabled = true;
        btnNo.disabled = true;
    } else {
        btnOk.disabled = !CAN_CHECK || myDone;
        btnNo.disabled = !CAN_CHECK || myDone;
    }
    btnOk.style.opacity = btnOk.disabled ? 0.5 : 1;
    btnNo.style.opacity = btnNo.disabled ? 0.5 : 1;

    const heart = document.getElementById("heart");
    const state = document.getElementById("stateText");

    if (day.broken) {
        state.innerText = "爱心永久破碎 💔";
        heart.innerText = "💔";
        return;
    }

    if (cnt === 0) {
        state.innerText = "等待两人打卡";
        heart.innerText = "❤️";
    } else if (cnt === 1) {
        state.innerText = "已1人打卡，等待另一人";
        heart.innerText = "❤️";
    } else {
        const s1 = day.status[day.list[0]];
        const s2 = day.status[day.list[1]];
        if (s1 && s2) {
            state.innerText = "两人完成 ✨ 爱心圆满";
            heart.innerText = "❤️";
        } else {
            day.broken = true;
            data.checkinData[TODAY_KEY] = day;
            updateData(data);
            state.innerText = "爱心破碎 💔 (永久)";
            heart.innerText = "💔";
        }
    }
}

// 打卡逻辑
async function doCheck(flag) {
    if (!CAN_CHECK) { alert("今天不是打卡日"); return; }
    const data = await fetchData();
    if (!data.checkinData) data.checkinData = {};
    const day = data.checkinData[TODAY_KEY] || { list: [], status: {}, broken: false };

    if (day.broken) { alert("爱心已破碎"); return; }
    if (day.list.includes(devId)) { alert("你已打卡"); return; }
    if (day.list.length >= 2) { alert("已满2人"); return; }

    day.list.push(devId);
    day.status[devId] = flag;
    data.checkinData[TODAY_KEY] = day;
    await updateData(data);
    cacheData = data;
    renderPage(data);
}

// 登录逻辑（永不卡死）
async function login() {
    const pwd = document.getElementById("pwd").value.trim();
    if (pwd !== PASSWORD) { alert("密码错误"); return; }

    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    // 先显示缓存 → 绝不卡死
    renderPage(cacheData);
    
    // 后台更新
    const data = await fetchData();
    renderPage(data);
    
    setInterval(async () => {
        const d = await fetchData();
        renderPage(d);
    }, 3000);
}
</script>
</body>
</html>
