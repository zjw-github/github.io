<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人爱心打卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        @keyframes heartShake {
            0%,100% { transform: rotate(0); }
            25% { transform: rotate(-4deg); }
            75% { transform: rotate(4deg); }
        }
        .heart-beat {
            animation: heartBeat 1.2s infinite !important;
        }
        .heart-shake {
            animation: heartShake 2s infinite !important;
        }
    </style>
</head>
<body class="bg-pink-50 min-h-screen flex flex-col items-center p-4">

<div id="app" class="max-w-sm w-full text-center pt-6">
    <h1 class="text-xl font-bold text-pink-500">💘 双人爱心打卡</h1>
    <p id="today" class="text-gray-500 text-sm mt-1"></p>
    <p class="mt-2 text-sm text-green-600">✅ 今日可打卡</p>

    <div id="heart" class="text-7xl my-6 heart-beat text-pink-500">❤️</div>
    <p id="status" class="text-lg">等待两人打卡</p>
    <p class="text-gray-600 mt-1">已打卡 <span id="count">0</span>/2</p>

    <div class="flex gap-4 justify-center mt-6">
        <button id="btnOk" onclick="doCheck(true)" class="bg-green-500 text-white px-6 py-3 rounded-full">✅ 完成</button>
        <button id="btnNo" onclick="doCheck(false)" class="bg-red-500 text-white px-6 py-3 rounded-full">❌ 缺席</button>
    </div>
</div>

<script>
// ===================== 日期（每天自动刷新）=====================
const now = new Date();
const TODAY = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`;
const STORAGE_KEY = "LOVE_"+TODAY;
const DEVICE_KEY = "DEVICE_"+TODAY;

// 加载今日数据
let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
    count: 0,
    c1: null,
    c2: null
};
let myDone = localStorage.getItem(DEVICE_KEY);

// 初始化显示
document.getElementById("today").innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
refresh();

// ===================== 打卡 =====================
function doCheck(ok) {
    if (myDone) {
        alert("你今天已经打过卡啦！");
        return;
    }
    myDone = "1";
    localStorage.setItem(DEVICE_KEY, "1");
    data.count++;
    if (data.count === 1) data.c1 = ok;
    if (data.count === 2) data.c2 = ok;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    refresh();
}

// ===================== 刷新界面 =====================
function refresh() {
    const count = document.getElementById("count");
    const status = document.getElementById("status");
    const heart = document.getElementById("heart");
    const btnOk = document.getElementById("btnOk");
    const btnNo = document.getElementById("btnNo");

    count.innerText = data.count;

    // 按钮禁用
    if (myDone) {
        btnOk.disabled = true;
        btnNo.disabled = true;
        btnOk.style.opacity = "0.5";
        btnNo.style.opacity = "0.5";
    }

    // 状态逻辑（你要的规则：必须两人都✅才不碎）
    if (data.count === 0) {
        status.innerText = "等待两人打卡";
    } else if (data.count === 1) {
        status.innerText = "已1人打卡，等待另一人";
    } else {
        if (data.c1 && data.c2) {
            status.innerText = "两人都完成 ✨ 爱心圆满";
            heart.className = "text-7xl my-6 heart-beat text-pink-500";
            heart.innerText = "❤️";
        } else {
            status.innerText = "爱心破碎 💔 有人缺席";
            heart.className = "text-7xl my-6 heart-shake text-gray-400";
            heart.innerText = "💔";
        }
    }
}
</script>
</body>
</html>
