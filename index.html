<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人爱心日历打卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { 
                        love: '#ff4d6d',
                        loveLight: '#ff758f',
                        loveBroken: '#6b7280'
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .heart-beat { animation: heartBeat 1.2s infinite; }
        .fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { 
            0%{opacity:0;transform:scale(0.8);}
            100%{opacity:1;transform:scale(1);} 
        }
        .heart-icon{text-shadow:0 0 25px #ff4d6d70;}
        .record-item{border-bottom:1px solid #eee; padding:6px 0;}
    </style>
</head>
<body class="bg-gradient-to-br from-pink-100 via-rose-50 to-pink-100 min-h-screen p-4 flex flex-col items-center">

<div id="login" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
        <h2 class="text-lg font-bold text-center mb-3 text-love">🔒 请输入专属密码</h2>
        <input id="pwd" type="password" placeholder="请输入密码" class="w-full border border-pink-200 rounded-lg px-3 py-2 mb-3 focus:outline-none focus:border-love">
        <button onclick="login()" class="w-full bg-love text-white py-2 rounded-lg font-bold hover:bg-loveLight transition">进入</button>
    </div>
</div>

<div id="app" class="hidden w-full max-w-sm text-center">
    <h1 class="text-2xl font-bold text-love mb-1">💘 双人爱心打卡 💘</h1>

    <p id="todayText" class="text-gray-600 font-medium text-lg mb-1"></p>
    <p id="tipText" class="text-lg font-bold px-4 py-2 rounded-xl mb-4"></p>

    <div id="heart" class="text-8xl my-6 fade-in heart-beat heart-icon text-love">❤️</div>
    <p id="stateText" class="text-lg font-medium text-gray-700">加载中...</p>
    <p class="text-gray-600 mb-4">已打卡 <span id="countText">0</span>/2</p>

    <div class="flex gap-3 justify-center mb-6">
        <button id="btnOk" onclick="doCheck(true)" class="bg-green-500 text-white px-6 py-3 rounded-full font-bold shadow-lg hover:bg-green-400 transition">✅ 完成</button>
        <button id="btnNo" onclick="doCheck(false)" class="bg-red-500 text-white px-6 py-3 rounded-full font-bold shadow-lg hover:bg-red-400 transition">❌ 缺席</button>
    </div>

    <!-- 新增：打卡记录区域 -->
    <div class="w-full bg-white/70 rounded-xl p-3 mt-4">
        <h3 class="font-bold text-gray-700 mb-2">📜 打卡记录</h3>
        <div id="recordList" class="text-sm text-gray-600 max-h-48 overflow-y-auto">
            暂无记录
        </div>
    </div>
</div>

<script>
const PASSWORD = "123456";

// 你的专属 jsonbin 配置
const BIN_ID = "69f42d85856a68218992b395";
const API_KEY = "$2a$10$TdJa3W.GmV1iDbroiQ9myOkutegIe7QvPn5uDEnhBEPS5eDCxiq5i";
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

const now = new Date();
const Y = now.getFullYear();
const M = now.getMonth() + 1;
const D = now.getDate();
const TODAY_KEY = `${Y}-${M}-${D}`;

// 核心规则：仅5月及以后 每月1号、15号可打卡
const CAN_CHECK = M >= 5 && (D === 1 || D === 15);

let devId = localStorage.getItem("devId");
if(!devId){
    devId = "dev_" + Math.random().toString(36).slice(2);
    localStorage.setItem("devId", devId);
}

async function getCloudData(){
    try{
        let res = await fetch(API_URL + "?meta=false", {
            headers: { "X-Master-Key": API_KEY }
        });
        let json = await res.json();
        return json;
    }catch(e){
        return { checkinData: {} };
    }
}

async function saveCloudData(data){
    await fetch(API_URL,{
        method:"PUT",
        headers:{
            "Content-Type":"application/json",
            "X-Master-Key": API_KEY
        },
        body:JSON.stringify(data)
    });
}

// 渲染打卡记录
function renderRecord(data){
    const checkinData = data.checkinData || {};
    const recordList = document.getElementById("recordList");
    const keys = Object.keys(checkinData).sort().reverse(); // 倒序，最新在上面

    let html = "";
    let hasRecord = false;

    for(let k of keys){
        // 只展示 1号、15号 记录
        let dayNum = parseInt(k.split("-")[2]);
        if(dayNum !== 1 && dayNum !== 15) continue;

        hasRecord = true;
        let item = checkinData[k];
        let cnt = item.list ? item.list.length : 0;
        let statusTxt = "";

        if(item.broken){
            statusTxt = "💔 爱心破碎";
        }else if(cnt === 2){
            statusTxt = "❤️ 圆满完成";
        }else{
            statusTxt = "⏳ 未集齐两人";
        }

        html += `<div class="record-item">${k} &nbsp; ${statusTxt} &nbsp; ${cnt}/2</div>`;
    }

    recordList.innerHTML = hasRecord ? html : "<div class='py-2'>暂无打卡记录</div>";
}

async function renderUI(){
    const data = await getCloudData();
    
    document.getElementById("todayText").innerText = `📅 今天：${Y}年${M}月${D}日`;
    const tip = document.getElementById("tipText");
    
    if(CAN_CHECK){
        tip.innerText = "✅ 今日是打卡日";
        tip.className = "text-lg font-bold px-4 py-2 rounded-xl mb-4 bg-green-100 text-green-800";
    }else{
        tip.innerText = "❌ 今日非打卡日";
        tip.className = "text-lg font-bold px-4 py-2 rounded-xl mb-4 bg-red-100 text-red-800";
    }

    const checkinData = data.checkinData || {};
    if(!checkinData[TODAY_KEY]) checkinData[TODAY_KEY] = { list:[], status:{}, broken: false };
    let day = checkinData[TODAY_KEY];
    let cnt = Math.min(day.list.length, 2);
    document.getElementById("countText").innerText = cnt;

    let myDone = day.list.includes(devId);
    let btnOk = document.getElementById("btnOk");
    let btnNo = document.getElementById("btnNo");
    
    if (day.broken) {
        btnOk.disabled = true;
        btnNo.disabled = true;
    } else {
        btnOk.disabled = !CAN_CHECK || myDone;
        btnNo.disabled = !CAN_CHECK || myDone;
    }

    btnOk.style.opacity = btnOk.disabled ? 0.5 : 1;
    btnNo.style.opacity = btnNo.disabled ? 0.5 : 1;

    let heart = document.getElementById("heart");
    let state = document.getElementById("stateText");

    if (day.broken) {
        state.innerText = "爱心永久破碎 💔";
        heart.innerText = "💔";
        return;
    }

    if(cnt === 0){
        state.innerText = "等待两人打卡";
        heart.innerText = "❤️";
    }else if(cnt === 1){
        state.innerText = "已1人打卡，等待另一人";
        heart.innerText = "❤️";
    }else{
        let s1 = day.status[day.list[0]];
        let s2 = day.status[day.list[1]];
        
        if(s1 && s2){
            state.innerText = "两人完成 ✨ 爱心圆满";
            heart.innerText = "❤️";
        }else{
            day.broken = true;
            data.checkinData[TODAY_KEY] = day;
            saveCloudData(data);
            
            state.innerText = "爱心破碎 💔 (永久)";
            heart.innerText = "💔";
        }
    }

    // 渲染打卡记录
    renderRecord(data);
}

async function doCheck(flag){
    if(!CAN_CHECK){
        alert("今天不是打卡日期，仅5月后每月1/15号可打卡");
        return;
    }
    let data = await getCloudData();
    if (!data.checkinData) data.checkinData = {};
    
    let day = data.checkinData[TODAY_KEY] || { list:[], status:{}, broken: false };
    
    if (day.broken) {
        alert("爱心已永久破碎，无法操作");
        return;
    }

    if(day.list.includes(devId)){
        alert("你今天已经打过卡了");
        return;
    }
    if(day.list.length >=2){
        alert("今日双人打卡已满，禁止第三人打卡");
        return;
    }

    day.list.push(devId);
    day.status[devId] = flag;
    data.checkinData[TODAY_KEY] = day;
    await saveCloudData(data);
    
    await renderUI();
}

async function login(){
    let pwd = document.getElementById("pwd").value.trim();
    if(pwd === PASSWORD){
        document.getElementById("login").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        
        await renderUI();
        
        setInterval(async ()=>{
            await renderUI();
        }, 2000);
    }else{
        alert("密码错误");
    }
}
</script>
</body>
</html>
