<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人爱心打卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { 
                        love: '#ff4d6d',
                        loveLight: '#ff758f',
                        loveBroken: '#6b7280'
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        @keyframes heartShake {
            0%,100% { transform: rotate(0); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        .heart-beat { animation: heartBeat 1.2s infinite; }
        .heart-shake { animation: heartShake 2s infinite; }
        .fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { 
            0%{opacity:0;transform:scale(0.8);}
            100%{opacity:1;transform:scale(1);} 
        }
        .heart-icon{text-shadow:0 0 25px #ff4d6d70;}
    </style>
</head>
<body class="bg-gradient-to-br from-pink-100 via-rose-50 to-pink-100 min-h-screen p-4 flex flex-col items-center">

<div id="login" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
        <h2 class="text-lg font-bold text-center mb-3 text-love">🔒 请输入专属密码</h2>
        <input id="pwd" type="password" placeholder="请输入密码" class="w-full border border-pink-200 rounded-lg px-3 py-2 mb-3 focus:outline-none focus:border-love">
        <button onclick="login()" class="w-full bg-love text-white py-2 rounded-lg font-bold hover:bg-loveLight transition">进入</button>
    </div>
</div>

<div id="app" class="hidden w-full max-w-sm text-center">
    <h1 class="text-2xl font-bold text-love mb-1">💘 双人爱心打卡 💘</h1>

    <p id="today" class="text-gray-600 font-medium text-lg mb-1"></p>
    <p id="checkTip" class="text-lg font-bold px-4 py-2 rounded-xl mb-4"></p>

    <div id="heart" class="text-8xl my-6 fade-in heart-beat heart-icon text-love">❤️</div>
    <p id="state" class="text-lg font-medium text-gray-700">等待两人打卡</p>
    <p class="text-gray-600 mb-4">已打卡 <span id="count">0</span>/2</p>

    <div class="flex gap-3 justify-center mb-6">
        <button id="okBtn" onclick="doCheck(true)" class="bg-green-500 text-white px-6 py-3 rounded-full font-bold shadow-lg hover:bg-green-400 transition">✅ 完成</button>
        <button id="noBtn" onclick="doCheck(false)" class="bg-red-500 text-white px-6 py-3 rounded-full font-bold shadow-lg hover:bg-red-400 transition">❌ 缺席</button>
    </div>
</div>

<script>
const PASSWORD = "123456";
const CLOUD_API = "https://jsonblob.com/api/jsonBlob/1352625482790739968";

const now = new Date();
const Y = now.getFullYear();
const M = now.getMonth() + 1;
const D = now.getDate();
const TODAY_KEY = `${Y}-${M}-${D}`;

const IS_AFTER_MAY = M >= 5;
const IS_1_OR_15 = D === 1 || D === 15;
const IS_CHECK_DAY = IS_AFTER_MAY && IS_1_OR_15;

if(!localStorage.getItem("devId")){
    localStorage.setItem("devId","dev_" + Math.random().toString(36).slice(2));
}
const SELF_DEV_ID = localStorage.getItem("devId");
let todayData = { members:[], status:{} };

async function syncGetCloud() {
    try {
        const res = await fetch(CLOUD_API + "?t=" + Date.now());
        return await res.json();
    } catch (e) {
        return {};
    }
}

async function syncSetCloud(data) {
    try {
        await fetch(CLOUD_API, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });
    } catch (e) {}
}

async function refreshData() {
    const all = await syncGetCloud();
    todayData = all[TODAY_KEY] || { members: [], status: {} };
    renderPage();
}

async function login() {
    const pwd = document.getElementById("pwd").value.trim();
    if (pwd === PASSWORD) {
        document.getElementById("login").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        renderPage();
        await refreshData();
        
        setInterval(refreshData, 3000);
    } else {
        alert("密码错误");
    }
}

async function doCheck(flag) {
    if (!IS_CHECK_DAY) {
        alert("今天不可以打卡");
        return;
    }

    const all = await syncGetCloud();
    const day = all[TODAY_KEY] || { members: [], status: {} };

    if (day.members.includes(SELF_DEV_ID)) {
        alert("你今日已打卡");
        return;
    }
    if (day.members.length >= 2) {
        alert("今日打卡已满");
        return;
    }

    day.members.push(SELF_DEV_ID);
    day.status[SELF_DEV_ID] = flag;
    all[TODAY_KEY] = day;
    await syncSetCloud(all);

    // 立即刷新界面（修复打卡不更新）
    await refreshData();
}

function renderPage() {
    document.getElementById("today").innerText = `📅 今天：${Y}年${M}月${D}日`;

    const countEl = document.getElementById("count");
    const stateEl = document.getElementById("state");
    const heartEl = document.getElementById("heart");
    const okBtn = document.getElementById("okBtn");
    const noBtn = document.getElementById("noBtn");
    const checkTip = document.getElementById("checkTip");

    const count = Math.min(todayData.members.length, 2);
    countEl.innerText = count;

    if (IS_CHECK_DAY) {
        checkTip.innerText = "✅ 今天可以打卡！";
        checkTip.className = "text-lg font-bold px-4 py-2 rounded-xl mb-4 bg-green-100 text-green-800";
    } else {
        checkTip.innerText = "❌ 今天不可以打卡";
        checkTip.className = "text-lg font-bold px-4 py-2 rounded-xl mb-4 bg-red-100 text-red-800";
    }

    const meChecked = todayData.members.includes(SELF_DEV_ID);
    okBtn.disabled = !IS_CHECK_DAY || meChecked;
    noBtn.disabled = !IS_CHECK_DAY || meChecked;
    okBtn.style.opacity = okBtn.disabled ? 0.5 : 1;
    noBtn.style.opacity = noBtn.disabled ? 0.5 : 1;

    if (count === 0) {
        stateEl.innerText = "等待两人打卡";
        heartEl.className = "text-8xl my-6 fade-in heart-beat heart-icon text-love";
        heartEl.innerText = "❤️";
    } else if (count === 1) {
        stateEl.innerText = "已1人打卡，等待另一人";
        heartEl.className = "text-8xl my-6 fade-in heart-beat heart-icon text-love";
        heartEl.innerText = "❤️";
    } else {
        const s1 = todayData.status[todayData.members[0]];
        const s2 = todayData.status[todayData.members[1]];
        if (s1 && s2) {
            stateEl.innerText = "两人完成 ✨ 爱心圆满";
            heartEl.className = "text-8xl my-6 fade-in heart-beat heart-icon text-love";
            heartEl.innerText = "❤️";
        } else {
            stateEl.innerText = "爱心破碎 💔";
            heartEl.className = "text-8xl my-6 fade-in heart-shake text-loveBroken";
            heartEl.innerText = "💔";
        }
    }
}
</script>
</body>
</html>
